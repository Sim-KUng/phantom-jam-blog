name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm  # <-- yarn에서 npm으로 변경!

      - name: 패키지 설치
        run: npm install  # <-- npm install로 변경!

      - name: 블로그 빌드
        run: npm run build  # <-- npm run build로 변경!

      - name: 깃허브 페이지로 배포
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build